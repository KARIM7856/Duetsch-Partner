<!-- @dsCard group="Grammar" name="Analysis result" subtitle="Score badges, word chips, error tooltip, corrected sentence" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeutschFlow — Analysis result</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: Arial, Helvetica, sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8">
  <div class="w-full max-w-2xl mx-auto space-y-6">

    <!-- Score badges -->
    <section>
      <h2 class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-3">Score badge states</h2>
      <div class="flex flex-wrap gap-3">
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border bg-green-100 text-green-700 border-green-200">Score: 92%</span>
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border bg-yellow-100 text-yellow-700 border-yellow-200">Score: 68%</span>
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border bg-red-100 text-red-700 border-red-200">Score: 45%</span>
      </div>
    </section>

    <!-- Result card -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h3 class="text-sm font-medium text-slate-500 uppercase tracking-wide">Analysis Result</h3>
        <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium border bg-yellow-100 text-yellow-700 border-yellow-200">Score: 80%</span>
      </div>

      <div class="bg-white border border-slate-200 rounded-lg p-4">
        <div class="text-lg leading-relaxed flex flex-wrap items-end gap-y-2">
          <span class="mx-0.5 text-slate-900">Ich</span>
          <span class="mx-0.5 text-slate-900">gehe</span>
          <span class="mx-0.5 text-slate-900">in</span>
          <!-- error word with tooltip -->
          <span class="relative inline-block mx-0.5">
            <span class="text-red-600 underline decoration-dotted decoration-red-400 cursor-pointer">der</span>
            <span class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-56 bg-white border border-slate-200 p-3 rounded-lg shadow-lg z-10 text-xs text-left">
              <span class="block font-bold text-red-500">Correction: die</span>
              <span class="block mt-1 text-slate-600">Article Gender (Akkusativ)</span>
              <span class="block mt-1 text-blue-500 underline">Learn Rule &rarr;</span>
            </span>
          </span>
          <span class="mx-0.5 text-slate-900">Schule.</span>
        </div>
      </div>

      <div class="bg-green-50 border border-green-200 rounded-lg p-4">
        <p class="text-sm font-medium text-green-700 mb-1">Corrected version:</p>
        <p class="text-green-900">Ich gehe in die Schule.</p>
      </div>
    </section>
  </div>
</body>
</html>
