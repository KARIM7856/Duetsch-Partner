<!-- @dsCard group="Grammar" name="Grammar input card" subtitle="Type / Speak tabs, textarea, analyze button" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeutschFlow — Grammar input</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: Arial, Helvetica, sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8">
  <div class="w-full max-w-2xl mx-auto">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-900">DeutschFlow</h1>
      <p class="text-slate-500 mt-2">AI-powered German grammar analysis for A1 learners</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-slate-200">
        <button class="flex-1 py-3 text-sm font-medium relative text-slate-900">
          Type
          <span class="absolute bottom-0 left-0 right-0 h-0.5 bg-slate-900"></span>
        </button>
        <button class="flex-1 py-3 text-sm font-medium text-slate-400 hover:text-slate-600">Speak</button>
      </div>

      <!-- Content -->
      <div class="p-6">
        <div class="space-y-4">
          <textarea class="w-full h-32 p-3 border border-slate-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-slate-300 text-slate-900 placeholder:text-slate-400" placeholder="Schreibe einen deutschen Satz...">Ich gehe in die Schule jeden Tag.</textarea>
          <button class="w-full py-2.5 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-800">Analyze</button>
        </div>
      </div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-4">Speak tab swaps the textarea for the microphone recorder.</p>
  </div>
</body>
</html>
