<!-- @dsCard group="Game Mode" name="Scene board" subtitle="16:10 gradient board, label pill, character sprites (incl. locked)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeutschFlow — Scene board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: Arial, Helvetica, sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8">
  <div class="w-full max-w-3xl mx-auto space-y-4">
    <h2 class="text-xs font-semibold uppercase tracking-wide text-slate-500">Game Mode — Das Dorf</h2>

    <div class="relative w-full overflow-hidden rounded-2xl shadow-xl bg-gradient-to-b from-sky-300 via-green-300 to-green-500" style="aspect-ratio: 16 / 10;">
      <!-- Label -->
      <div class="absolute top-3 left-1/2 -translate-x-1/2 z-10 bg-black/30 backdrop-blur-sm text-white text-sm font-medium px-4 py-1 rounded-full">Willkommen im Dorf!</div>

      <!-- Baker -->
      <button class="absolute flex flex-col items-center gap-1" style="left:20%; top:90%; transform: translate(-50%,-50%);">
        <span style="font-size:2.5rem; line-height:1;">👨‍🍳</span>
        <span class="text-xs font-semibold text-white drop-shadow rounded-full px-2 py-0.5 whitespace-nowrap bg-black/40">Der Bäcker</span>
      </button>

      <!-- Teacher -->
      <button class="absolute flex flex-col items-center gap-1" style="left:55%; top:35%; transform: translate(-50%,-50%);">
        <span style="font-size:2.5rem; line-height:1;">👩‍🏫</span>
        <span class="text-xs font-semibold text-white drop-shadow rounded-full px-2 py-0.5 whitespace-nowrap bg-black/40">Die Lehrerin</span>
      </button>

      <!-- Mayor -->
      <button class="absolute flex flex-col items-center gap-1" style="left:40%; top:72%; transform: translate(-50%,-50%);">
        <span style="font-size:2.5rem; line-height:1;">🧑‍💼</span>
        <span class="text-xs font-semibold text-white drop-shadow rounded-full px-2 py-0.5 whitespace-nowrap bg-black/40">Der Bürgermeister</span>
      </button>

      <!-- Child (locked) -->
      <button class="absolute flex flex-col items-center gap-1" style="left:75%; top:65%; transform: translate(-50%,-50%);">
        <span class="relative" style="font-size:2.5rem; line-height:1;">
          <span class="select-none block grayscale opacity-60">🧒</span>
          <span class="absolute -top-1 -right-2 bg-white/95 rounded-full w-6 h-6 flex items-center justify-center shadow-md ring-1 ring-slate-200" style="font-size:0.85rem; line-height:1;">🔒</span>
        </span>
        <span class="text-xs font-semibold text-white drop-shadow rounded-full px-2 py-0.5 whitespace-nowrap bg-slate-700/60">Das Kind</span>
      </button>
    </div>
    <p class="text-xs text-slate-400">Characters are positioned by percentage. Locked characters are greyed with a 🔒 badge until prerequisites are met.</p>
  </div>
</body>
</html>
