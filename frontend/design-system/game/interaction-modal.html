<!-- @dsCard group="Game Mode" name="Interaction modal" subtitle="Dialogue panel + locked view" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeutschFlow — Interaction modal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: Arial, Helvetica, sans-serif; } </style>
</head>
<body class="bg-slate-200 text-slate-900 p-8">
  <div class="max-w-3xl mx-auto grid sm:grid-cols-2 gap-6 items-start">

    <!-- Dialogue panel -->
    <div class="w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="text-lg font-bold text-slate-900">Die Lehrerin</h2>
        <button class="text-slate-400 hover:text-slate-700 text-xl leading-none" aria-label="Close">✕</button>
      </div>
      <div class="p-6 space-y-3">
        <div class="flex justify-start">
          <div class="max-w-[80%] bg-slate-100 text-slate-800 rounded-2xl rounded-bl-sm px-4 py-2.5 text-sm">
            <p class="text-[11px] font-semibold text-slate-400 mb-0.5">Die Lehrerin</p>
            Hallo! Lernst du Deutsch?
          </div>
        </div>
        <div class="flex justify-end">
          <div class="max-w-[80%] bg-slate-900 text-white rounded-2xl rounded-br-sm px-4 py-2.5 text-sm">
            <p class="text-[11px] font-semibold text-slate-300 mb-0.5">Du</p>
            Ja, ich lerne Deutsch. Es ist schwer!
          </div>
        </div>
        <button class="w-full mt-2 py-2.5 px-5 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-700 text-sm">Weiter</button>
      </div>
    </div>

    <!-- Locked view -->
    <div class="w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
        <h2 class="text-lg font-bold text-slate-900">Das Kind</h2>
        <button class="text-slate-400 hover:text-slate-700 text-xl leading-none" aria-label="Close">✕</button>
      </div>
      <div class="p-6">
        <div class="flex flex-col items-center gap-4 py-4 text-center">
          <span class="text-5xl">🔒</span>
          <p class="text-slate-800 font-semibold">Noch gesperrt</p>
          <p class="text-slate-500 text-sm">Erledige zuerst <span class="font-semibold text-slate-700">Der Bäcker</span>, um dieses Gespräch zu öffnen.</p>
          <button class="mt-2 py-2.5 px-5 bg-slate-900 text-white rounded-lg font-medium hover:bg-slate-700 text-sm">OK</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
