<!-- @dsCard group="meine Puppe" name="Warmth tiers" subtitle="Color-coded guess feedback: chip + label + progress bar, 6 tiers" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeutschFlow — Warmth tiers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: Arial, Helvetica, sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8">
  <div class="w-full max-w-md mx-auto">
    <h2 class="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-3">Guess warmth — cold to correct</h2>
    <div class="bg-white border border-slate-200 rounded-xl p-4 space-y-4">

      <!-- Eiskalt -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-blue-100 text-blue-700 border-blue-300">❄️ Eiskalt</span>
          <span class="text-xs text-slate-400">„Tisch" · 8%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-blue-500" style="width:8%;"></div></div>
      </div>

      <!-- Kühl -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-sky-100 text-sky-700 border-sky-300">🌬️ Kühl</span>
          <span class="text-xs text-slate-400">„Baum" · 28%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-sky-400" style="width:28%;"></div></div>
      </div>

      <!-- Warm -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-amber-100 text-amber-700 border-amber-300">🌤️ Warm</span>
          <span class="text-xs text-slate-400">„Vogel" · 48%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-amber-400" style="width:48%;"></div></div>
      </div>

      <!-- Heiß -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-orange-100 text-orange-700 border-orange-300">♨️ Heiß</span>
          <span class="text-xs text-slate-400">„Katze" · 64%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-orange-500" style="width:64%;"></div></div>
      </div>

      <!-- Brennt heiß -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-red-100 text-red-700 border-red-300">🔥 Brennt heiß</span>
          <span class="text-xs text-slate-400">„Wolf" · 88%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-red-500" style="width:88%;"></div></div>
      </div>

      <!-- Richtig -->
      <div class="space-y-1">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border bg-green-100 text-green-800 border-green-300">🎉 Richtig!</span>
          <span class="text-xs text-slate-400">„Hund" · 100%</span>
        </div>
        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"><div class="h-full rounded-full bg-green-500" style="width:100%;"></div></div>
      </div>

    </div>
  </div>
</body>
</html>
